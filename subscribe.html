<!DOCTYPE html>

<body>
    <div id="main" class="container-fluid col-12">
        <div id="container" class="container d-flex flex-column align-items-center pb-5">
            <!-- -----------------navbar------------------- -->
            <div id="navbar" class="d-flex justify-content-between align-items-center col-12">
                <div id="logo">
                    <img src="./Footage/Logo.svg" alt="">
                </div>
                <div id="links" class="d-none d-md-flex align-items-center gap-3">
                    <a href="./index.html">HOME</a>
                    <a href="./about-us.html">ABOUT US</a>
                    <a href="./subscribe.html">Create your plan</a>
                </div>
                <img src="./Footage/Hamburger.png" alt="" class="d-block d-md-none">
            </div>

            <!-- -----------------Hero------------------- -->

            <div id="hero"
                class="col-12 d-flex justify-content-center justify-content-md-start justify-content-lg-start">
                <div id="card" class="h-25">
                    <h1 class="mb-3">Great coffee made simple.</h1>
                    <p class="mt-4">Start your mornings with the world's best coffees. Try our expertly

            <div id="footer" class=" col-12 d-flex flex-column flex-md-row justify-content-between align-items-center gap-4 p-md-3 p-lg-5 p-5">

                <div id="footer-links" class="d-flex justify-content-between align-items-center">

                    <a href="./about.html">ABOUT US</a>
                    <a href="./subscribe.html">Create your plan</a>
                </div>

                    <img src="./Footage/fb.svg" alt="">
                    <img src="./Footage/tw.svg" alt="">
                    <img src="./Footage/in.svg" alt="">
                </div>

        </div>
